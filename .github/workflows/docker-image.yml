name: Docker build -> push -> deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v6
    - name: java setup
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # See 'Supported distributions' for available options
        java-version: '21'
    - name: build jar
      run: |
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests
    - name: dockerhub login
      uses: docker/login-action@v3
      with: 
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_TOKEN}}
    - name: build docker image
      run: docker build -t ${{secrets.DOCKER_USERNAME}}/welcome:latest
    - name: push docker image
      run: docker push ${{secrets.DOCKER_USERNAME}}/welcome:latest
    - name: SSH and  deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{secrets.EC2_HOST}}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker stop welcome || true
          docker rm welcome || true
          docker pull ${{secrets.DOCKER_USERNAME}}/welcome:latest
          docker run -d --name welcome -p 8080:8080 ${{secrets.DOCKER_USERNAME}}/welcome:latest
      
